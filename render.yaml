services:
  - type: web
    name: workscanai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workscanai-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"

databases:
  - name: workscanai-db
    databaseName: workscanai
    user: workscanai_user
    plan: free
